name: Deploy to TheBatch
on:
  push:
    branches: [ master ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 94.143.140.212
          username: root
          key: "${{ secrets.THEBATCH_SSH_KEY }}"
          script: |
            rsync -avz --delete ./config/ /opt/headscale/config/
            rsync -avz --delete ./config/ /opt/mosquitto/config/
            docker compose -f /opt/headscale/docker-compose.yml pull && docker compose -f /opt/headscale/docker-compose.yml up -d
            docker compose -f /opt/mosquitto/docker-compose.yml pull && docker compose -f /opt/mosquitto/docker-compose.yml up -d
